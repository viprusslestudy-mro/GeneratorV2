<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Экспорт данных</title>
  <base target="_top">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); color: #333; }
    .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 85%; }
    h2 { margin: 0 0 10px 0; font-size: 20px; color: #2c3e50; }
    .subtitle { font-size: 13px; color: #7f8c8d; margin-bottom: 25px; }
    .loader-circle { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #a855f7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .progress-bar-container { background: #ecf0f1; border-radius: 10px; height: 12px; overflow: hidden; margin-bottom: 15px; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #a855f7, #3b82f6); transition: width 0.5s ease; }
    .status-text { font-size: 14px; font-weight: 500; color: #34495e; margin-bottom: 5px; }
    .timer { font-size: 12px; color: #95a5a6; font-variant-numeric: tabular-nums; }
    .success-icon { display: none; font-size: 50px; margin-bottom: 10px; animation: pop 0.4s ease; }
    @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader-circle" id="spinner"></div>
    <div class="success-icon" id="successIcon">✅</div>
    <h2 id="mainTitle">Подготовка...</h2>
    <div class="subtitle">Пожалуйста, не закрывайте это окно. База данных обрабатывает информацию.</div>
    <div class="progress-bar-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status-text" id="statusText">Инициализация скрипта</div>
    <div class="timer" id="timer">Время: 0 сек</div>
  </div>

  <script>
    let seconds = 0;
    let progress = 0;
    
    // Получаем параметры (тип функции и заголовок) из Apps Script
    google.script.url.getLocation(function(location) {
      const params = location.parameter;
      const functionToCall = params.func || 'exportAllToSupabase';
      document.getElementById('mainTitle').innerText = params.title || 'Сбор данных...';

      const timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').innerText = 'Время выполнения: ' + seconds + ' сек';
        
        if (progress < 95) {
          progress += (95 - progress) * 0.05; 
          document.getElementById('progressBar').style.width = progress + '%';
        }
        
        if (seconds === 3) document.getElementById('statusText').innerText = 'Связь с Мастер-Таблицей...';
        if (seconds === 10) document.getElementById('statusText').innerText = 'Сбор данных из вкладок...';
        if (seconds === 30) document.getElementById('statusText').innerText = 'Формирование структуры...';
        if (seconds === 60) document.getElementById('statusText').innerText = 'Отправка в облако Supabase...';
      }, 1000);

      // Запускаем серверную функцию
      google.script.run
        .withSuccessHandler(function() {
          clearInterval(timerInterval);
          document.getElementById('progressBar').style.width = '100%';
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('successIcon').style.display = 'block';
          document.getElementById('mainTitle').innerText = 'Успешно отправлено!';
          document.getElementById('statusText').innerText = 'Данные уже доступны в React-дашборде.';
          document.getElementById('statusText').style.color = '#10b981';
          setTimeout(() => { google.script.host.close(); }, 3000);
        })
        .withFailureHandler(function(err) {
          clearInterval(timerInterval);
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('mainTitle').innerText = '❌ Ошибка';
          document.getElementById('statusText').innerText = err.message;
          document.getElementById('statusText').style.color = '#ef4444';
          document.getElementById('progressContainer').style.display = 'none';
        })
        [functionToCall](); // Вызывает функцию динамически
    });
  </script>
</body>
</html>
